name: Android Release + Telegram Notify

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Validate signing secrets
        run: |
          test -n "${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}" || (echo "Missing secret: ANDROID_SIGNING_KEYSTORE_BASE64" && exit 1)
          test -n "${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}" || (echo "Missing secret: ANDROID_SIGNING_STORE_PASSWORD" && exit 1)
          test -n "${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}" || (echo "Missing secret: ANDROID_SIGNING_KEY_ALIAS" && exit 1)
          test -n "${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}" || (echo "Missing secret: ANDROID_SIGNING_KEY_PASSWORD" && exit 1)

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APKs
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ runner.temp }}/release.jks
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleRelease

      - name: Upload release APKs (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: gitcoz-signed-release-apks
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload mapping files (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: gitcoz-release-mapping
          path: app/build/outputs/mapping/release/*
          if-no-files-found: warn

      - name: Verify release APKs
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ls -lah app/build/outputs/apk/release

      - name: Extract changelog for tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          awk -v tag="[$TAG_NAME]" '
            $0 ~ "^## \\[" { in_section = ($0 ~ "^## \\[" tag "\\]") }
            in_section { print }
          ' CHANGELOG.md > /tmp/release-notes.txt
          if [ ! -s /tmp/release-notes.txt ]; then
            echo "No matching section for $TAG_NAME in CHANGELOG.md" > /tmp/release-notes.txt
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.txt
          fail_on_unmatched_files: true
          files: |
            app/build/outputs/apk/release/*.apk

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set, skipping notification"
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS="Release build succeeded"
          else
            STATUS="Release build failed"
          fi

          if [ -f /tmp/release-notes.txt ]; then
            RELEASE_NOTES=$(cat /tmp/release-notes.txt)
          else
            RELEASE_NOTES="No changelog section found."
          fi

          MESSAGE=$(printf '%s\n' \
            "<b>GitCoz Release</b>" \
            "$STATUS" \
            "Tag: ${GITHUB_REF#refs/tags/}" \
            "Commit: ${GITHUB_SHA:0:7}" \
            "" \
            "$RELEASE_NOTES")

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode=HTML \
            --data-urlencode text="$MESSAGE" > /dev/null

          if [ "$JOB_STATUS" = "success" ]; then
            for apk in app/build/outputs/apk/release/*.apk; do
              if [ -f "$apk" ]; then
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                  -F chat_id="$TELEGRAM_CHAT_ID" \
                  -F document=@"$apk" > /dev/null
              fi
            done
          fi
